name: Advanced CI/CD Pipeline

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main", "develop" ]

env:
  NODE_VERSION: '22.x'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci

      - name: Install a11y ESLint plugin
        run: npm install --save-dev eslint-plugin-jsx-a11y
        
      - name: TypeScript Compiler Check (strict, no ignoreBuildErrors)
        run: npx tsc --noEmit
        
      - name: Run ESLint (with accessibility rules)
        run: npm run lint

  test:
    name: Automated Unit Testing
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Run Vitest Suite (Unit & Component)
        run: npm run test

  build:
    name: Production Frontend Build
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          
      - name: Install Dependencies
        run: npm ci
        
      - name: Build Next.js Application (strict — no ignoreBuildErrors)
        run: npm run build
        env:
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: demo-project
          NEXT_PUBLIC_FIREBASE_APP_ID: demo-app-id
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: demo-bucket
          NEXT_PUBLIC_FIREBASE_API_KEY: demo-key
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: demo-domain
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: demo-sender
